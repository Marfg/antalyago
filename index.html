<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Antalya Go Projesi</title>
    <script src="https://cdn.jsdelivr.net/npm/wgo@2.3.1/wgo.min.js"></script>
    <style>
        body { background: #f4f1ea; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        #goban { width: 450px; height: 450px; background: #deb887; border: 5px solid #5d4037; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .info { margin-top: 15px; font-weight: bold; font-size: 1.2em; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Antalya Go Topluluğu</h1>
    <div id="goban"></div>
    <div id="status" class="info">Başlatılıyor...</div>

    <script>
        window.onload = function() {
            // WGo'nun yüklendiğinden %100 emin olalım
            if (typeof WGo !== "undefined") {
                var board = new WGo.Board(document.getElementById("goban"), {
                    width: 450,
                    size: 19
                });
                
                // Tengen'e bir taş koyalım (9,9)
                board.addObject({x: 9, y: 9, c: WGo.B});
                document.getElementById("status").innerText = "Tahta Hazır! Ortadaki taş Tengen.";
                
                // Tıklama ile taş ekleme
                var turn = WGo.W; // Sırada beyaz var
                board.addEventListener("click", function(x, y) {
                    board.addObject({x: x, y: y, c: turn});
                    turn = (turn === WGo.B) ? WGo.W : WGo.B;
                    document.getElementById("status").innerText = "Sıra: " + (turn === WGo.B ? "Siyah" : "Beyaz");
                });
            } else {
                document.getElementById("status").innerText = "Hata: Kütüphane hala yüklenemedi. Lütfen internet bağlantınızı kontrol edin.";
            }
        };
    </script>
</body>
</html>
