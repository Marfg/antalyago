<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Antalya Go - WGo Denemesi</title>
    
    <script src="https://cdn.jsdelivr.net/npm/wgo@2.3.1/wgo.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wgo@2.3.1/wgo.player.css">

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdf6e3; }
        #goban-box { margin-top: 20px; border: 4px solid #5d4037; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #status { font-size: 24px; margin-top: 20px; color: #268bd2; }
    </style>
</head>
<body>

    <h1>Antalya Go Topluluğu</h1>
    <div id="goban-box">
        <div id="board-element"></div>
    </div>
    <div id="status">Yükleniyor...</div>

    <script>
        // Kütüphane yüklenene kadar bekleyelim
        function start() {
            if (typeof WGo !== "undefined") {
                var board = new WGo.Board(document.getElementById("board-element"), {
                    width: 500,
                    size: 19
                });
                
                var turn = WGo.B;
                document.getElementById("status").innerText = "Sıra Siyah'ta";

                board.addEventListener("click", function(x, y) {
                    board.addObject({x: x, y: y, c: turn});
                    turn = (turn === WGo.B) ? WGo.W : WGo.B;
                    document.getElementById("status").innerText = "Sıra: " + (turn === WGo.B ? "Siyah" : "Beyaz");
                });
            } else {
                setTimeout(start, 100); // 100ms sonra tekrar dene
            }
        }
        start();
    </script>
</body>
</html>
