<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antalya Go Projesi</title>
    
    <script src="https://unpkg.com/wgo@2.3.1/wgo.min.js"></script>
    <script src="https://unpkg.com/wgo@2.3.1/wgo.player.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/wgo@2.3.1/wgo.player.css">
    
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #e9e4d1; 
            padding: 20px;
        }
        /* Goban'ın (Tahtanın) görüneceği kapsayıcı */
        #goban-container { 
            width: 500px; 
            height: 500px; 
            background: #dcb35c; /* Geleneksel Kaya (Kayawood) rengi */
            border: 5px solid #5d4037;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin: 20px auto;
        }
        #status {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Antalya Go Topluluğu</h1>
    <div id="status">Kütüphane kontrol ediliyor...</div>

    <div id="goban-container">
        <div id="my-goban" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        window.onload = function() {
            // WGo yüklendi mi kontrol et
            if (typeof WGo === "undefined") {
                document.getElementById("status").innerText = "Hata: WGo kütüphanesi yüklenemedi!";
                return;
            }

            var turn = WGo.B; // Siyahla başla
            
            // 2. Tahtayı oluştur
            var board = new WGo.Board(document.getElementById("my-goban"), {
                width: 500,
                size: 19
            });

            document.getElementById("status").innerText = "Sıra: SİYAH";

            // 3. Tıklama özelliği
            board.addEventListener("click", function(x, y) {
                // Aynı yere taş konulmasını engellemek için basit kontrol
                board.addObject({x: x, y: y, c: turn});

                // Sırayı değiştir
                if (turn === WGo.B) {
                    turn = WGo.W;
                    document.getElementById("status").innerText = "Sıra: BEYAZ";
                } else {
                    turn = WGo.B;
                    document.getElementById("status").innerText = "Sıra: SİYAH";
                }
            });

            // Merkeze bir yıldız noktası işareti koyalım (Opsiyonel)
            board.addObject({x: 9, y: 9, c: WGo.W});
        };
    </script>

</body>
</html>
