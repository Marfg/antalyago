<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Yapay Zekaya Karşı – Antalya Go Topluluğu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    #1c1c20;
      --gold:  #c8a84b;
      --gold2: #e0be68;
      --text:  #e8e4de;
      --muted: rgba(232,228,222,.45);
      --glass: rgba(10,10,18,.90);
      --gb:    rgba(200,168,75,.22);
      --green: #3ecf80;
      --red:   #e05050;
      --blue:  #4a9eff;
      --sat: env(safe-area-inset-top,0px);
      --sab: env(safe-area-inset-bottom,0px);
      --sal: env(safe-area-inset-left,0px);
      --sar: env(safe-area-inset-right,0px);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans',sans-serif; overflow:hidden; }

    #c { position:fixed; inset:0; display:block; z-index:0; }

    /* ── TOPBAR ── */
    #topbar {
      position:fixed; top:0; left:0; right:0; z-index:30;
      height:calc(50px + var(--sat));
      background:var(--glass); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--gb);
      display:flex; align-items:center; gap:.7rem;
      padding:var(--sat) 1rem 0;
    }
    .back-btn {
      color:var(--gold); font-size:.72rem; letter-spacing:.07em; font-weight:600;
      text-decoration:none; padding:5px 12px;
      border:1px solid var(--gb); border-radius:6px;
      transition:all .18s; white-space:nowrap; flex-shrink:0;
    }
    .back-btn:hover { background:var(--gold); color:var(--bg); }
    .tb-title {
      font-family:'Noto Serif',serif; font-size:.95rem; font-weight:700;
      letter-spacing:.05em; flex-shrink:0;
    }
    /* Orta: sıra göstergesi */
    #tb-status {
      flex:1; display:flex; align-items:center; justify-content:center;
      gap:.5rem; font-size:.75rem; font-weight:600;
    }
    .s-stone {
      width:13px; height:13px; border-radius:50%; flex-shrink:0;
      transition:transform .2s, box-shadow .2s;
    }
    .s-stone.black { background:radial-gradient(circle at 36% 34%, #555, #0c0c12); }
    .s-stone.white { background:radial-gradient(circle at 36% 34%, #fff, #c4c0ba); box-shadow:0 0 5px rgba(255,255,255,.3); }
    .s-stone.active { transform:scale(1.35); }
    .s-stone.black.active { box-shadow:0 0 8px rgba(0,0,0,.7); }
    .s-stone.white.active { box-shadow:0 0 8px rgba(255,255,255,.5); }
    #s-label { color:var(--text); }
    /* Sağ: hamle notasyonu */
    #last-move-tag {
      font-size:.68rem; color:var(--muted); font-family:monospace;
      padding:2px 7px; border:1px solid var(--gb); border-radius:4px;
      white-space:nowrap; flex-shrink:0;
    }

    /* ── SAĞ PANEL ── */
    #panel {
      position:fixed; top:calc(50px + var(--sat)); right:0; bottom:0;
      width:250px; z-index:20;
      background:var(--glass); backdrop-filter:blur(16px);
      border-left:1px solid var(--gb);
      display:flex; flex-direction:column; gap:.75rem;
      padding:1.1rem 1rem;
      overflow-y:auto;
    }
    .sec-label {
      font-size:.6rem; font-weight:700; letter-spacing:.14em;
      text-transform:uppercase; color:var(--gold);
      margin-bottom:.3rem;
    }

    /* Renk seçici */
    .color-pick { display:flex; gap:.4rem; }
    .cp-btn {
      flex:1; padding:.5rem .4rem; border-radius:7px;
      border:1.5px solid var(--gb); background:transparent;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; gap:.35rem;
      font-family:'Noto Sans',sans-serif; font-size:.73rem;
      font-weight:600; color:var(--muted); transition:all .18s;
    }
    .cp-btn.active-b { border-color:rgba(100,100,130,.9); color:var(--text); background:rgba(30,30,45,.6); }
    .cp-btn.active-w { border-color:rgba(220,216,210,.7); color:var(--text); background:rgba(220,216,210,.08); }
    .sp { width:13px; height:13px; border-radius:50%; flex-shrink:0; }
    .sp.b { background:radial-gradient(circle at 36% 34%, #555, #0c0c12); }
    .sp.w { background:radial-gradient(circle at 36% 34%, #fff, #c4c0ba); }

    /* Düşünüyor göstergesi */
    #think-bar {
      display:none; align-items:center; gap:.45rem;
      padding:.5rem .7rem;
      background:rgba(200,168,75,.07);
      border:1px solid rgba(200,168,75,.2); border-radius:7px;
      font-size:.72rem; font-weight:600; color:var(--gold);
    }
    #think-bar.show { display:flex; }
    .td { width:5px; height:5px; border-radius:50%; background:var(--gold);
          animation:tpulse 1.4s ease-in-out infinite; }
    .td:nth-child(2){ animation-delay:.22s; }
    .td:nth-child(3){ animation-delay:.44s; }
    @keyframes tpulse {
      0%,80%,100% { transform:scale(.5); opacity:.3; }
      40% { transform:scale(1.25); opacity:1; }
    }

    /* İstatistikler */
    .stat-row { display:flex; gap:.5rem; }
    .stat-box {
      flex:1; background:rgba(200,168,75,.05);
      border:1px solid var(--gb); border-radius:6px;
      padding:.5rem .6rem; text-align:center;
    }
    .stat-val { font-size:1.3rem; font-weight:700; color:var(--gold); font-family:'Noto Serif',serif; }
    .stat-lbl { font-size:.6rem; color:var(--muted); }

    /* Feedback */
    #feedback {
      font-size:.74rem; font-weight:600; line-height:1.5;
      padding:.4rem .7rem; border-radius:5px;
      border:1px solid var(--gb); color:var(--muted);
      background:rgba(200,168,75,.05);
      transition:all .2s; display:none;
    }
    #feedback.show { display:block; }
    #feedback.ok   { background:rgba(62,207,128,.1);  border-color:var(--green); color:var(--green); }
    #feedback.err  { background:rgba(224,80,80,.1);   border-color:var(--red);   color:var(--red); }
    #feedback.info { background:rgba(74,158,255,.08); border-color:var(--blue);  color:var(--blue); }
    #feedback.ai   { background:rgba(200,168,75,.08); border-color:var(--gold);  color:var(--gold); }

    /* Oyun sonu */
    #gameover {
      display:none; padding:.75rem;
      background:rgba(200,168,75,.08);
      border:1px solid rgba(200,168,75,.3); border-radius:8px;
      text-align:center; flex-direction:column; gap:.5rem;
    }
    #gameover.show { display:flex; }
    .go-title { font-size:.88rem; font-weight:700; color:var(--gold); }
    .go-score { font-size:.76rem; color:var(--muted); line-height:1.6; }

    /* Butonlar */
    .action-btn {
      width:100%; padding:.52rem; border-radius:7px;
      border:1px solid var(--gb); background:transparent;
      cursor:pointer; font-family:'Noto Sans',sans-serif;
      font-size:.76rem; font-weight:600; color:var(--text);
      transition:all .18s;
    }
    .action-btn:hover { background:rgba(200,168,75,.08); border-color:var(--gold); color:var(--gold); }
    .action-btn.danger:hover { background:rgba(224,80,80,.08); border-color:var(--red); color:var(--red); }

    /* Engine badge */
    .engine-badge {
      font-size:.6rem; font-weight:700; letter-spacing:.08em;
      padding:3px 8px; border-radius:4px;
      border:1px solid var(--gb); color:var(--muted);
      background:rgba(200,168,75,.04);
      white-space:nowrap; flex-shrink:0; transition:all .3s;
    }
    .engine-badge.ready {
      border-color:rgba(62,207,128,.4); color:var(--green);
      background:rgba(62,207,128,.06);
    }

    /* Model yükleyici */
    #model-loader {
      padding:.6rem .7rem;
      background:rgba(74,158,255,.05);
      border:1px solid rgba(74,158,255,.18); border-radius:7px;
      font-size:.68rem; color:var(--muted);
      display:none;
    }
    #model-loader.show { display:block; }
    .ml-phase { color:var(--blue); font-weight:600; margin-bottom:.3rem; }
    .ml-bar { height:3px; border-radius:2px; background:rgba(74,158,255,.12); overflow:hidden; }
    .ml-bar-fill {
      height:100%; background:var(--blue); border-radius:2px;
      animation:indeterminate 1.6s ease-in-out infinite; transform-origin:left;
    }
    .ml-tip { margin-top:.45rem; font-size:.63rem; line-height:1.4; opacity:0; transition:opacity .5s; }
    .ml-tip.show { opacity:1; }
    #model-loader.done .ml-phase { color:var(--green); }
    #model-loader.done .ml-bar-fill { animation:none; transform:scaleX(1); background:var(--green); }
    @keyframes indeterminate {
      0%   { transform:scaleX(0) translateX(0%); }
      50%  { transform:scaleX(.55) translateX(90%); }
      100% { transform:scaleX(0) translateX(600%); }
    }

    /* Zorluk kartları */
    .diff-grid { display:grid; grid-template-columns:1fr 1fr; gap:.35rem; }
    .diff-card {
      padding:.45rem .5rem; border-radius:6px;
      border:1.5px solid var(--gb); background:transparent;
      cursor:pointer; text-align:center;
      font-family:'Noto Sans',sans-serif; transition:all .18s;
    }
    .diff-card:hover:not(.unavail) { border-color:var(--gold); background:rgba(200,168,75,.06); }
    .diff-card.active { border-color:var(--gold); background:rgba(200,168,75,.12); }
    .diff-card.unavail { opacity:.38; cursor:not-allowed; }
    .diff-name { font-size:.68rem; font-weight:700; color:var(--text); }
    .diff-kyu  { font-size:.58rem; color:var(--muted); margin-top:.1rem; }

    /* Gelişmiş oyun sonu */
    .go-winner    { font-size:1.05rem; font-weight:700; color:var(--gold); }
    .go-komi      { font-size:.63rem; color:var(--muted); margin-top:.2rem; line-height:1.4; }
    .go-territory { font-size:.68rem; color:var(--muted); margin-top:.15rem; }
    .go-actions   { display:flex; gap:.4rem; }
    .go-actions .action-btn { flex:1; }

    /* Model yükleyici iyileştirme */
    .ml-phase { animation: ml-text-pulse 2s ease-in-out infinite; }
    @keyframes ml-text-pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
    #model-loader.done .ml-phase { animation:none; opacity:1; }
    .ml-learn {
      display:block; margin-top:.5rem;
      font-size:.62rem; color:var(--blue);
      text-decoration:none; opacity:.8; transition:opacity .15s;
    }
    .ml-learn:hover { opacity:1; }

    /* Ko işareti yok sayılır (canvas'ta çizilir) */

    /* ── MOBİL ── */
    @media(max-width:640px) {
      #panel {
        top:auto; bottom:0; right:0; left:0; width:100%;
        max-height:48vh; border-left:none; border-top:1px solid var(--gb);
        flex-direction:row; flex-wrap:wrap; padding:.6rem;
        gap:.5rem; overflow-y:auto;
      }
      #panel > * { flex:1 1 45%; min-width:100px; }
      .color-pick { flex-direction:column; }
      .stat-row   { flex-direction:column; }
    }
  </style>
</head>
<body>

  <a class="back-btn" href="index.html">← Ana</a>

<!-- ── MASKOT ── -->
<style>
  .mascot-btn {
    position: fixed; bottom: 24px; right: 24px;
    width: 64px; height: 64px;
    cursor: pointer; z-index: 9000; outline: none;
  }
  @supports (bottom: env(safe-area-inset-bottom)) {
    .mascot-btn { bottom: calc(24px + env(safe-area-inset-bottom)); }
  }
  .mascot-wrap { width: 64px; height: 64px; position: relative; }
  .mascot-svg {
    width: 64px; height: 64px;
    animation: mascot-bob 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,.55));
  }
  .mascot-svg .eye-l, .mascot-svg .eye-r {
    animation: mascot-blink 4s ease-in-out infinite;
    transform-origin: center;
  }
  .mascot-svg .amber-glow { animation: mascot-glow-pulse 3s ease-in-out infinite; }
  .mascot-btn:hover .mascot-svg { animation: mascot-pulse .6s ease-in-out infinite; }
  .mascot-btn.is-speaking .mascot-svg .amber-glow { animation: mascot-glow-pulse 1.2s ease-in-out infinite; }
  .mascot-btn.is-excited .mascot-svg { animation: mascot-jump .6s cubic-bezier(.36,.07,.19,.97) 1; }
  @keyframes mascot-bob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes mascot-blink  { 0%,90%,100%{transform:scaleY(1)} 94%{transform:scaleY(.08)} }
  @keyframes mascot-pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes mascot-glow-pulse { 0%,100%{opacity:.18} 50%{opacity:.55} }
  @keyframes mascot-jump {
    0%  {transform:translateY(0) scale(1,1)}
    30% {transform:translateY(-12px) scale(.95,1.08)}
    60% {transform:translateY(0) scale(1.08,.92)}
    80% {transform:translateY(-4px) scale(.98,1.04)}
    100%{transform:translateY(0) scale(1,1)}
  }
  @keyframes badge-pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(224,90,90,.4)}
    50%    {box-shadow:0 0 0 6px rgba(224,90,90,0)}
  }
  .mascot-badge {
    position: absolute; top: -4px; right: -4px;
    width: 18px; height: 18px;
    background: #e05a5a; border-radius: 50%;
    font-size: 11px; color: white;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #1c1c20;
    animation: badge-pulse 2s ease-in-out infinite;
  }
  .mascot-bubble {
    position: absolute; bottom: 72px; right: 0;
    min-width: 180px; max-width: 240px;
    background: #24242c; border: 1px solid rgba(200,168,75,.28);
    border-radius: 12px 12px 2px 12px;
    padding: 10px 14px; font-size: 13px; line-height: 1.5;
    color: #e8e4de; font-family: 'Noto Sans', sans-serif;
    opacity: 0; transform: translateY(8px) scale(.95);
    transform-origin: bottom right;
    transition: opacity .2s ease, transform .2s ease;
    pointer-events: none;
  }
  .mascot-bubble.is-visible {
    opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
  }
  @media (prefers-reduced-motion: reduce) {
    .mascot-svg, .mascot-svg *, .mascot-badge { animation: none !important; }
  }
</style>

<div class="mascot-btn" id="mascot-btn" role="button"
     aria-label="Asistan — yardım için tıkla" tabindex="0">
  <div class="mascot-wrap">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" class="mascot-svg">
      <defs>
        <radialGradient id="mstone-shine" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="white" stop-opacity=".85"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <filter id="mstone-glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3"/>
        </filter>
      </defs>
      <ellipse cx="32" cy="35" rx="27" ry="23" fill="#111118"/>
      <ellipse cx="24" cy="26" rx="11" ry="7" fill="url(#mstone-shine)" opacity=".26"/>
      <ellipse cx="32" cy="14" rx="14" ry="6"
               fill="#B8955A" opacity=".18" filter="url(#mstone-glow)" class="amber-glow"/>
      <ellipse cx="22" cy="33" rx="5.5" ry="6.5" fill="white" class="eye-l"/>
      <ellipse cx="23" cy="33" rx="2.8" ry="3.2" fill="#0a0a12" class="pupil-l"/>
      <ellipse cx="42" cy="33" rx="5.5" ry="6.5" fill="white" class="eye-r"/>
      <ellipse cx="43" cy="33" rx="2.8" ry="3.2" fill="#0a0a12" class="pupil-r"/>
    </svg>
  </div>
  <span class="mascot-badge" aria-hidden="true" hidden>1</span>
  <div class="mascot-bubble" id="mascot-bubble" aria-live="polite"></div>
</div>

<script>
(function() {
  const btn    = document.getElementById('mascot-btn');
  const bubble = document.getElementById('mascot-bubble');
  let _hideTimer = null;

  window.mascotSay = function(text, durationMs) {
    if (durationMs === undefined) durationMs = 4000;
    bubble.textContent = text;
    bubble.classList.add('is-visible');
    btn.classList.add('is-speaking');
    clearTimeout(_hideTimer);
    _hideTimer = setTimeout(function() {
      bubble.classList.remove('is-visible');
      btn.classList.remove('is-speaking');
    }, durationMs);
  };

  window.mascotCelebrate = function() {
    btn.classList.remove('is-excited');
    void btn.offsetWidth;
    btn.classList.add('is-excited');
    btn.addEventListener('animationend', function() {
      btn.classList.remove('is-excited');
    }, { once: true });
  };

  btn.addEventListener('click', function() {
    mascotSay('Sana nasil yardimci olabilirim?');
  });
  btn.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); mascotSay('Sana nasil yardimci olabilirim?'); }
  });
})();
</script>

<script type="module">
import { BoardState }              from './core/boardState.js';
import { isValidMove, applyMove }  from './core/ruleEngine.js';

/* ══════════════════════════════════════════════════════
   3D ENGINE
══════════════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

const SIZE  = 9;
const CELL  = 48;
const HALF  = (SIZE - 1) * CELL / 2;
const BOARD_H  = 14;
const STONE_R  = 20;
const ASPECT3D = 0.36;

let camYaw   = 0.50;
let camPitch = window.innerWidth <= 640 ? 1.42 : 1.10;
let camDist  = 490;

/* Projeksiyon */
function project(x, y, z) {
  const rx  =  x * Math.cos(camYaw)  + z * Math.sin(camYaw);
  const rz  = -x * Math.sin(camYaw)  + z * Math.cos(camYaw);
  const ry2 =  y * Math.cos(camPitch) - rz * Math.sin(camPitch);
  const rz2 =  y * Math.sin(camPitch) + rz * Math.cos(camPitch);
  const sc  = 700 / Math.max(700 + rz2, 1) * (camDist / 500);
  return { sx: W / 2 + rx * sc, sy: H / 2 + ry2 * sc, scale: sc, rz: rz2 };
}

/* Kamera sürükleme — masaüstü */
let drag = null;
canvas.addEventListener('mousedown', e => {
  drag = { x: e.clientX, y: e.clientY, yaw: camYaw, pitch: camPitch };
});
canvas.addEventListener('mousemove', e => {
  if (drag) {
    camYaw   = drag.yaw   + (e.clientX - drag.x) * .0040;
    camPitch = Math.max(.5, Math.min(Math.PI * .48,
               drag.pitch - (e.clientY - drag.y) * .0040));
  }
  updateGhost(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup',    () => { drag = null; });
canvas.addEventListener('mouseleave', () => { drag = null; ghost = null; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camDist = Math.max(HALF * .8, Math.min(HALF * 2.8, camDist + e.deltaY * .55));
}, { passive: false });
canvas.addEventListener('click', e => {
  const moved = drag && Math.hypot(e.clientX - drag.x, e.clientY - drag.y) > 4;
  if (!moved) onBoardClick(e.clientX, e.clientY);
});

/* Dokunmatik */
let touch0 = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1)
    touch0 = { x: e.touches[0].clientX, y: e.touches[0].clientY,
               yaw: camYaw, pitch: camPitch };
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touch0 && e.touches.length === 1) {
    camYaw   = touch0.yaw   + (e.touches[0].clientX - touch0.x) * .005;
    camPitch = Math.max(.5, Math.min(Math.PI * .48,
               touch0.pitch - (e.touches[0].clientY - touch0.y) * .005));
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (touch0 && e.changedTouches.length === 1) {
    const dx = e.changedTouches[0].clientX - touch0.x;
    const dy = e.changedTouches[0].clientY - touch0.y;
    if (Math.hypot(dx, dy) < 8)
      onBoardClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
  touch0 = null;
});

/* Ahşap doku */
const woodCv = document.createElement('canvas');
woodCv.width = woodCv.height = 512;
(function () {
  const wc = woodCv.getContext('2d');
  const g  = wc.createLinearGradient(0, 0, 512, 0);
  g.addColorStop(0, '#c8a84a'); g.addColorStop(.38, '#c2a040'); g.addColorStop(1, '#c8a444');
  wc.fillStyle = g; wc.fillRect(0, 0, 512, 512);
  wc.globalAlpha = .055;
  for (let i = 0; i < 120; i++) {
    const y = Math.random() * 512, dk = i % 7 === 0;
    wc.strokeStyle = dk ? '#5a2e00' : '#e8d060';
    wc.lineWidth = dk ? Math.random() * 1.2 + .4 : Math.random() * .8 + .2;
    wc.beginPath(); wc.moveTo(0, y);
    wc.bezierCurveTo(128, y + (Math.random() - .5) * 3,
                     384, y + (Math.random() - .5) * 3, 512, y);
    wc.stroke();
  }
  wc.globalAlpha = 1;
})();
const woodPat = ctx.createPattern(woodCv, 'repeat');

const COL_LABELS = 'ABCDEFGHJ'; // I atlanır

const DIFFICULTY_LEVELS = [
  { id:1, name:'Başlangıç', kyu:'25–20 kyu', timeMs:600,  engine:'mcts' },
  { id:2, name:'Acemi',     kyu:'20–15 kyu', timeMs:1200, engine:'mcts' },
  { id:3, name:'Orta',      kyu:'15–10 kyu', timeMs:2400, engine:'mcts' },
  { id:4, name:'İleri',     kyu:'10–5 kyu',  timeMs:null, engine:'kata' },
  { id:5, name:'Uzman',     kyu:'5 kyu–dan', timeMs:null, engine:'kata' },
];
let currentLevel = 1;

const GO_TIPS = [
  'İki göz yapan grup ölmez.',
  'Köşeler önce, kenarlar sonra, merkez en son.',
  'Pas geçmek de stratejik bir hamledir.',
  'Bağlı taşlar birlikte nefes alır.',
  'Atari durumunda kaçmak ya da feda etmek arasında seç.',
  'Ko savaşları tehdit yaratmakla kazanılır.',
  'Düşmanın en güçlü hamlesi senin hamlendir.',
];
let tipIndex = 0;
let tipTimer = null;

let board       = new BoardState(SIZE);
let playerColor = 'black';
let aiColor     = 'white';
let moveCount   = 0;
let passCount   = 0; // ardışık pas sayısı
let ghost       = null;
let lastAIMoveXY = null; // AI'nın son hamlesi (vurgulama için)
let gameEnded   = false;
let territory   = null;   // { black:[{x,y}…], white:[{x,y}…] } oyun bitince dolar
let hlTime      = 0;

/* ── Board sync yardımcısı ── */
function syncBoard(newState) {
  board.grid    = newState.grid;
  board.stones  = newState.stones;
  board.turn    = newState.turn;
  board.koPoint = newState.koPoint;
  board.size    = newState.size;
}

/* ── Ekran → grid dönüşümü ── */
function screenToGrid(sx, sy) {
  const Y = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  let best = null, bestD = Infinity;
  for (let gx = 0; gx < SIZE; gx++) {
    for (let gz = 0; gz < SIZE; gz++) {
      const wx = -HALF + gx * CELL, wz = -HALF + gz * CELL;
      const p  = project(wx, Y, wz);
      const d  = Math.hypot(p.sx - sx, p.sy - sy);
      if (d < bestD) { bestD = d; best = { gx, gz, scale: p.scale }; }
    }
  }
  return best && bestD < CELL * best.scale * 1.15 ? best : null;
}

function updateGhost(mx, my) {
  ghost = screenToGrid(mx, my);
}

/* ── Durum gösterimi ── */
function updateStatus() {
  const isBlackTurn = board.turn === 'black';
  document.getElementById('stone-b').classList.toggle('active',  isBlackTurn);
  document.getElementById('stone-w').classList.toggle('active', !isBlackTurn);
  document.getElementById('s-label').textContent =
    isBlackTurn ? "Siyah'ın sırası" : "Beyaz'ın sırası";
}

function updateMoveTag(label) {
  document.getElementById('last-move-tag').textContent = label || '—';
}

function updateEngineBadge(state) {
  const el = document.getElementById('engine-badge');
  if (state === 'loading') {
    el.textContent = 'Motor Yükleniyor';
    el.classList.remove('ready');
  } else if (state === 'mcts') {
    el.textContent = 'Temel Motor';
    el.classList.remove('ready');
  } else if (state === 'kata') {
    el.textContent = 'KataGo';
    el.classList.add('ready');
  }
}

function initModelLoader() {
  if (window.mascotSay) mascotSay('Motor hazırlanıyor…', 6000);
  const phases = ['Ağırlıklar indiriliyor…', 'Model derleniyor…', 'GPU hazırlanıyor…'];
  let ph = 0;
  const phEl = document.getElementById('ml-phase');
  const tipEl = document.getElementById('ml-tip');
  const loEl  = document.getElementById('model-loader');

  loEl.classList.add('show');
  phEl.textContent = phases[ph];
  tipEl.textContent = GO_TIPS[0];
  setTimeout(() => tipEl.classList.add('show'), 100);

  tipTimer = setInterval(() => {
    tipEl.classList.remove('show');
    setTimeout(() => {
      tipIndex = (tipIndex + 1) % GO_TIPS.length;
      tipEl.textContent = GO_TIPS[tipIndex];
      tipEl.classList.add('show');
    }, 500);
  }, 5000);

  const phTimer = setInterval(() => {
    ph++;
    if (ph < phases.length) phEl.textContent = phases[ph];
    else clearInterval(phTimer);
  }, 4000);
}

function renderDifficultyCards() {
  const grid = document.getElementById('diff-grid');
  grid.innerHTML = DIFFICULTY_LEVELS.map(lv => {
    const unavail = lv.engine === 'kata' && !kataReady;
    const active  = lv.id === currentLevel;
    return `<button class="diff-card${active ? ' active' : ''}${unavail ? ' unavail' : ''}"
      onclick="selectDifficulty(${lv.id})"${unavail ? ' disabled' : ''}>
      <div class="diff-name">${lv.name}</div>
      <div class="diff-kyu">${lv.kyu}</div>
    </button>`;
  }).join('');
}

window.selectDifficulty = function(id) {
  if (aiThinking) return;
  const lv = DIFFICULTY_LEVELS.find(l => l.id === id);
  if (!lv || (lv.engine === 'kata' && !kataReady)) return;
  currentLevel = id;
  renderDifficultyCards();
};

let _fbTimer = null;
function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className   = `show ${type || ''}`;
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function showGameOver(scoreInfo) {
  lastScoreInfo = scoreInfo;

  if (scoreInfo.blackTerritory || scoreInfo.whiteTerritory) {
    const mkSet = arr => new Set((arr || []).map(p => p.x + ',' + p.y));
    territory = {
      black:     scoreInfo.blackTerritory || [],
      white:     scoreInfo.whiteTerritory || [],
      deadBlack: mkSet(scoreInfo.blackDead),
      deadWhite: mkSet(scoreInfo.whiteDead),
    };
  }

  const el = document.getElementById('gameover');
  el.classList.add('show');
  document.getElementById('btn-pass').disabled = true;

  const winner    = scoreInfo.winner;
  const winnerTr  = winner === 'black' ? 'Siyah' : 'Beyaz';
  const margin    = Math.abs(scoreInfo.rawDiff).toFixed(1);
  const isPlayerWin = winner === playerColor;

  document.getElementById('go-winner').textContent =
    isPlayerWin ? 'Kazandın' : 'Robot kazandı';
  if (isPlayerWin && window.mascotCelebrate) { mascotCelebrate(); mascotSay('Tebrikler!', 3000); }
  document.getElementById('go-score').textContent =
    `${winnerTr} galip — ${margin} puan farkıyla.`;
  document.getElementById('go-komi').textContent =
    `Komi ${scoreInfo.komi}: beyaza verilen avantaj puanı.`;

  const bLen = (scoreInfo.blackTerritory || []).length;
  const wLen = (scoreInfo.whiteTerritory || []).length;
  document.getElementById('go-territory').textContent =
    `Siyah bölgesi: ${bLen} · Beyaz: ${wLen}`;
}

window.openLearnFeedback = function() {
  if (!window.mascotSay) return;
  const diff = lastScoreInfo ? Math.abs(lastScoreInfo.rawDiff).toFixed(1) : '?';
  mascotSay(
    `Bu oyunda alan farkı ${diff} puandı. Köşeleri erkenden kapatmayı dene. Dersler için: Öğrenme Motoru.`,
    8000
  );
};

// MCTS (yedek): her zaman hazır; SCORE için de kullanılır
const mctsWorker = new Worker('./workers/goAI.worker.js', { type: 'module' });
// KataGo: CDN'den model yükler, hazır olunca MOVE için devreye girer
const kataWorker = new Worker('./workers/kataWorker.js');

let aiThinking   = false;
let kataReady    = false;
let lastScoreInfo = null;

function handleWorkerMessage(data) {
  aiThinking = false;
  document.getElementById('think-bar').classList.remove('show');

  if (!data.ok) {
    showFeedback('Robot hatası: ' + data.error, 'err');
    console.error('AI Worker error:', data.error);
    return;
  }

  if (data.type === 'SCORE') { showGameOver(data.score); return; }

  applyAIMove(data.move);
}

mctsWorker.addEventListener('message', ({ data }) => handleWorkerMessage(data));
mctsWorker.addEventListener('error', e => {
  aiThinking = false;
  document.getElementById('think-bar').classList.remove('show');
  showFeedback('Robot bağlanamadı.', 'err');
  console.error('Worker error:', e);
});

kataWorker.addEventListener('message', ({ data }) => {
  if (data.type === 'READY') {
    if (data.ok) {
      kataReady = true;
      const loEl = document.getElementById('model-loader');
      const phEl = document.getElementById('ml-phase');
      loEl.classList.add('done');
      phEl.textContent = 'KataGo Hazır';
      clearInterval(tipTimer);
      setTimeout(() => loEl.classList.remove('show'), 3000);
      updateEngineBadge('kata');
      document.getElementById('iter-lbl').textContent = 'KataGo';
      showFeedback(`KataGo hazir (${data.backend}).`, 'ok');
      if (window.mascotSay) mascotSay('Oynamaya hazırım!', 3500);
      renderDifficultyCards();
    } else {
      updateEngineBadge('mcts');
      showFeedback('KataGo yuklenemedi. Temel AI ile devam ediliyor.', 'info');
      console.warn('KataGo yuklenemedi — MCTS ile devam:', data.error);
    }
    return;
  }
  handleWorkerMessage(data);
});
kataWorker.addEventListener('error', e => console.warn('kataWorker error:', e));

updateEngineBadge('loading');
initModelLoader();

function triggerAI() {
  if (aiThinking || gameEnded) return;
  if (board.turn !== aiColor)  return;

  aiThinking = true;
  document.getElementById('think-bar').classList.add('show');

  const size = board.size;
  const grid = new Int8Array(size * size);
  for (const s of board.stones) {
    grid[s.y * size + s.x] = s.color === 'black' ? 1 : 2;
  }
  const ko     = board.koPoint
    ? board.koPoint.y * size + board.koPoint.x : -1;
  const colNum = aiColor === 'black' ? 1 : 2;
  const lv     = DIFFICULTY_LEVELS.find(l => l.id === currentLevel);

  if (kataReady && lv.engine === 'kata') {
    kataWorker.postMessage({ type: 'MOVE', boardData: { grid, ko, size }, color: colNum });
  } else {
    const timeMs = lv.engine === 'mcts' ? lv.timeMs : 2000;
    mctsWorker.postMessage(
      { type: 'MOVE', boardData: { grid, ko, size }, color: colNum, timeMs },
      [grid.buffer]
    );
  }
}

function requestFinalScore() {
  const size = board.size;
  const grid = new Int8Array(size * size);
  for (const s of board.stones) {
    grid[s.y * size + s.x] = s.color === 'black' ? 1 : 2;
  }
  const ko = board.koPoint ? board.koPoint.y * size + board.koPoint.x : -1;
  mctsWorker.postMessage(
    { type: 'SCORE', boardData: { grid, ko, size } },
    [grid.buffer]
  );
}

function applyAIMove(move) {
  lastAIMoveXY = null;

  if (move === 'pass') {
    board.turn = board.turn === 'black' ? 'white' : 'black';
    passCount++;
    showFeedback('Robot pas geçti.', 'ai');
    updateMoveTag('Robot: Pas');
    updateStatus();
    if (passCount >= 2) { checkGameOver(); return; }
    return; // sıra tekrar oyuncuda
  }

  passCount = 0;
  const { x, y } = move;
  const { newState } = applyMove(board, x, y, board.turn);
  syncBoard(newState);

  lastAIMoveXY = { x, y };
  moveCount++;
  const tag = `Robot: ${COL_LABELS[x]}${SIZE - y}`;
  document.getElementById('move-count').textContent = moveCount;
  document.getElementById('iter-count').textContent = move.iters ?? '—';
  updateMoveTag(tag);
  showFeedback(tag, 'ai');
  updateStatus();
}

function checkGameOver() {
  gameEnded = true;
  requestFinalScore();
}

/* ══════════════════════════════════════════════════════
   OYUNCU EYLEMLERI
══════════════════════════════════════════════════════ */
function onBoardClick(mx, my) {
  if (aiThinking || gameEnded) return;
  if (board.turn !== playerColor) return;

  const hit = screenToGrid(mx, my);
  if (!hit) return;
  const { gx, gz } = hit;

  if (board.isOccupied(gx, gz)) {
    showFeedback('Bu nokta dolu.', 'err'); return;
  }
  const check = isValidMove(board, gx, gz, board.turn);
  if (!check.valid) {
    showFeedback(check.reason === 'KO' ? '🚫 Ko kuralı — bu hamle yasak!' : 'Geçersiz hamle.', 'err');
    return;
  }

  passCount = 0;
  lastAIMoveXY = null;
  const { newState } = applyMove(board, gx, gz, board.turn);
  syncBoard(newState);

  moveCount++;
  const tag = `${COL_LABELS[gx]}${SIZE - gz}`;
  document.getElementById('move-count').textContent = moveCount;
  updateMoveTag(tag);
  showFeedback(`Sen: ${tag}`, 'ok');
  updateStatus();

  setTimeout(triggerAI, 220);
}

window.playerPass = function () {
  if (aiThinking || gameEnded) return;
  if (board.turn !== playerColor) return;

  board.turn = board.turn === 'black' ? 'white' : 'black';
  passCount++;
  showFeedback('Pas geçtin.', 'info');
  updateMoveTag('Pas');
  updateStatus();

  if (passCount >= 2) { checkGameOver(); return; }
  setTimeout(triggerAI, 300);
};

window.pickColor = function (c) {
  if (aiThinking) return;
  playerColor = c;
  aiColor     = c === 'black' ? 'white' : 'black';
  resetBoard();
  if (c === 'white') setTimeout(triggerAI, 600); // AI siyah → önce oynar
};

window.resetBoard = function () {
  board      = new BoardState(SIZE);
  moveCount  = 0; passCount = 0;
  gameEnded  = false;
  territory  = null;
  lastAIMoveXY = null;
  document.getElementById('move-count').textContent = '0';
  document.getElementById('iter-count').textContent = '—';
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('btn-pass').disabled = false;
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('cp-b').className =
    'cp-btn' + (playerColor === 'black' ? ' active-b' : '');
  document.getElementById('cp-w').className =
    'cp-btn' + (playerColor === 'white' ? ' active-w' : '');
  updateMoveTag('—');
  updateStatus();
  showFeedback(
    playerColor === 'black' ? 'Siyah oyuncusun. Hamle yap!' : 'Robot siyah. Düşünüyor…',
    'info'
  );
  if (playerColor === 'white') setTimeout(triggerAI, 600);
};

/* ══════════════════════════════════════════════════════
   ÇİZİM
══════════════════════════════════════════════════════ */
function drawBoard() {
  const bh = BOARD_H / 2, bw = HALF + CELL * .82;
  function face(corners, fill, stroke) {
    const pts = corners.map(([x, y, z]) => project(x, y, z));
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy));
    ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
    ctx.strokeStyle = stroke || fill; ctx.lineWidth = 1; ctx.stroke();
  }
  face([[-bw,-bh,-bw],[-bw,-bh,bw],[-bw,bh,bw],[-bw,bh,-bw]], '#7a4e0e', '#5e3a08');
  face([[-bw,-bh,bw],[bw,-bh,bw],[bw,bh,bw],[-bw,bh,bw]],     '#8a5a12', '#6a4408');
  face([[bw,-bh,-bw],[bw,-bh,bw],[bw,bh,bw],[bw,bh,-bw]],      '#966014', '#724808');

  const top  = [[-bw,-bh,-bw],[bw,-bh,-bw],[bw,-bh,bw],[-bw,-bh,bw]];
  const tpts = top.map(([x, y, z]) => project(x, y, z));
  ctx.save();
  ctx.beginPath();
  tpts.forEach((p, i) => i === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy));
  ctx.closePath(); ctx.clip();
  ctx.fillStyle = woodPat; ctx.globalAlpha = .96; ctx.fill();
  ctx.globalAlpha = .06; ctx.fillStyle = '#2a1200'; ctx.fill();
  ctx.globalAlpha = 1; ctx.strokeStyle = '#6a4008'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.restore();
}

function drawGrid() {
  const Y = -BOARD_H / 2 - .4;
  const corners = [[-HALF,Y,-HALF],[HALF,Y,-HALF],[HALF,Y,HALF],[-HALF,Y,HALF]];
  ctx.strokeStyle = 'rgba(55,24,0,.92)'; ctx.lineWidth = 1.9;
  for (let i = 0; i < 4; i++) {
    const a = project(...corners[i]), b = project(...corners[(i + 1) % 4]);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(55,24,0,.68)'; ctx.lineWidth = .8;
  for (let i = 1; i < SIZE - 1; i++) {
    const p = -HALF + i * CELL;
    let a = project(p, Y, -HALF), b = project(p, Y, HALF);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    a = project(-HALF, Y, p); b = project(HALF, Y, p);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
  const HOSHI = [[2,2],[6,2],[4,4],[2,6],[6,6]];
  HOSHI.forEach(([sx, sz]) => {
    const p = project(-HALF + sx * CELL, Y, -HALF + sz * CELL);
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 3.8 * p.scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(48,20,0,.88)'; ctx.fill();
  });
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < SIZE; i++) {
    const pos = -HALF + i * CELL;
    const lb  = project(pos, Y, HALF + CELL * .72);
    const nl  = project(-HALF - CELL * .72, Y, pos);
    const fs  = Math.round(9 * lb.scale); if (fs < 6) continue;
    ctx.font = `bold ${fs}px monospace`; ctx.fillStyle = 'rgba(75,36,6,.78)';
    ctx.fillText(COL_LABELS[i], lb.sx, lb.sy);
    ctx.fillText(String(SIZE - i), nl.sx, nl.sy);
  }
}

function drawStone(gx, gz, color, alpha, highlighted) {
  const Y  = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  const wx = -HALF + gx * CELL, wz = -HALF + gz * CELL;
  const p  = project(wx, Y, wz);
  const sp = Math.sin(camPitch), cp = Math.cos(camPitch);
  const rx = STONE_R * p.scale;
  const ry = rx * Math.sqrt(sp * sp + ASPECT3D * ASPECT3D * cp * cp);

  ctx.save();
  ctx.globalAlpha = alpha ?? 1;

  /* Gölge */
  ctx.beginPath();
  ctx.ellipse(p.sx + 1, p.sy + ry * .35, rx * .92, ry * .38, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.fill();

  /* Taş */
  const gr = ctx.createRadialGradient(p.sx - rx * .28, p.sy - ry * .28, rx * .05, p.sx, p.sy, rx);
  if (color === 'black') {
    gr.addColorStop(0, '#50505a'); gr.addColorStop(1, '#0c0c12');
  } else {
    gr.addColorStop(0, '#ffffff'); gr.addColorStop(1, '#c4c0ba');
  }
  ctx.beginPath();
  ctx.ellipse(p.sx, p.sy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = gr;
  ctx.fill();

  /* AI son hamle işareti — üçgen */
  if (highlighted) {
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, rx * .32, 0, Math.PI * 2);
    ctx.fillStyle = color === 'black' ? 'rgba(255,255,255,.55)' : 'rgba(0,0,0,.38)';
    ctx.fill();
  }

  ctx.restore();
}

function drawGhost() {
  if (!ghost || gameEnded) return;
  if (board.turn !== playerColor) return;
  if (board.isOccupied(ghost.gx, ghost.gz)) return;
  const check = isValidMove(board, ghost.gx, ghost.gz, board.turn);
  if (!check.valid) return;
  drawStone(ghost.gx, ghost.gz, board.turn, 0.35, false);
}

function drawStones() {
  const Y = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  const sorted = [...board.stones].sort((a, b) => {
    const pa = project(-HALF + a.x * CELL, Y, -HALF + a.y * CELL);
    const pb = project(-HALF + b.x * CELL, Y, -HALF + b.y * CELL);
    return pb.rz - pa.rz; // uzaktaki önce çizilir (painter's algorithm)
  });
  for (const s of sorted) {
    const isLast = lastAIMoveXY && s.x === lastAIMoveXY.x && s.y === lastAIMoveXY.y;
    const deadSet = territory && (s.color === 1 ? territory.deadBlack : territory.deadWhite);
    const alpha = deadSet && deadSet.has(s.x + ',' + s.y) ? 0.25 : 1;
    drawStone(s.x, s.y, s.color, alpha, isLast);
  }
}

function drawKo() {
  if (!board.koPoint) return;
  const { x, y } = board.koPoint;
  const Y  = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  const p  = project(-HALF + x * CELL, Y, -HALF + y * CELL);
  const rx = STONE_R * p.scale;
  const pulse = .6 + .4 * Math.sin(Date.now() * .005);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = '#e05050'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(p.sx, p.sy, rx * .52, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function drawTerritory() {
  if (!territory) return;
  const Y   = -BOARD_H / 2 - 0.3;
  const ARM = CELL * 0.22;
  const pulse = 0.55 + 0.45 * Math.sin(hlTime * 1.4);

  [
    [territory.black, '#1a1a2e'],
    [territory.white, '#f5f0e8'],
  ].forEach(([pts, col]) => {
    if (!pts?.length) return;
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth   = Math.max(1, 2.0);
    ctx.lineCap     = 'round';
    ctx.globalAlpha = 0.90 * pulse;
    pts.forEach(({ x, y }) => {
      const wx = -HALF + x * CELL;
      const wz = -HALF + y * CELL;
      const p  = project(wx, Y, wz);
      if (p.scale < 0.15) return;
      const pL = project(wx - ARM, Y, wz);
      const pR = project(wx + ARM, Y, wz);
      const pU = project(wx, Y, wz - ARM);
      const pD = project(wx, Y, wz + ARM);
      ctx.beginPath(); ctx.moveTo(pL.sx, pL.sy); ctx.lineTo(pR.sx, pR.sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pU.sx, pU.sy); ctx.lineTo(pD.sx, pD.sy); ctx.stroke();
    });
    ctx.restore();
  });
}

/* Ana render döngüsü */
function frame() {
  hlTime += 0.04;
  ctx.clearRect(0, 0, W, H);
  drawBoard();
  drawGrid();
  drawGhost();
  drawStones();
  drawKo();
  drawTerritory();
  requestAnimationFrame(frame);
}

frame();
updateStatus();
renderDifficultyCards();
showFeedback('Siyah oyuncusun. Hamle yap!', 'info');
</script>
</body>
