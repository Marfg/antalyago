<script>
(function() {
  const btn    = document.getElementById('mascot-btn');
  const bubble = document.getElementById('mascot-bubble');
  let _hideTimer = null;

  function setMouth(type) {
    const s = btn.querySelector('#m-smile');
    const n = btn.querySelector('#m-neutral');
    const t = btn.querySelector('#m-thinking');
    if (!s) return;
    s.hidden = type !== 'smile';
    n.hidden = type !== 'neutral';
    t.hidden = type !== 'thinking';
  }
  window.setMouth = setMouth;

  window.mascotSay = function(text, durationMs) {
    durationMs = durationMs === undefined ? 4500 : durationMs;
    bubble.textContent = text;
    bubble.classList.add('is-visible');
    btn.classList.add('is-speaking');
    setMouth('smile');
    clearTimeout(_hideTimer);
    _hideTimer = setTimeout(function() {
      bubble.classList.remove('is-visible');
      btn.classList.remove('is-speaking');
      setMouth('neutral');
    }, durationMs);
  };

  window.mascotCelebrate = function() {
    btn.classList.remove('is-celebrating');
    void btn.offsetWidth;
    btn.classList.add('is-celebrating');
    setMouth('smile');
    btn.addEventListener('animationend', function() {
      btn.classList.remove('is-celebrating');
    }, { once: true });
  };

  window.mascotThink = function(text) {
    btn.classList.add('is-thinking');
    setMouth('thinking');
    if (text) {
      bubble.textContent = text;
      bubble.classList.add('is-visible');
    }
  };

  window.mascotStopThink = function() {
    btn.classList.remove('is-thinking');
    bubble.classList.remove('is-visible');
    setMouth('neutral');
  };

  btn.addEventListener('click', function() {
    btn.classList.add('is-clicking');
    btn.addEventListener('animationend', function() {
      btn.classList.remove('is-clicking');
    }, { once: true });
    mascotSay('Sana nasıl yardımcı olabilirim?');
  });

  btn.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      mascotSay('Sana nasıl yardımcı olabilirim?');
    }
  });
})();
</script>

<script type="module">
import { BoardState }              from './core/boardState.js';
import { isValidMove, applyMove }  from './core/ruleEngine.js';

/* ══════════════════════════════════════════════════════
   3D ENGINE
══════════════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

const SIZE  = 9;
const CELL  = 48;
const HALF  = (SIZE - 1) * CELL / 2;
const BOARD_H  = 14;
const STONE_R  = 20;
const ASPECT3D = 0.36;

let camYaw   = 0.50;
let camPitch = window.innerWidth <= 640 ? 1.42 : 1.10;
let camDist  = 490;

/* Projeksiyon */
function project(x, y, z) {
  const rx  =  x * Math.cos(camYaw)  + z * Math.sin(camYaw);
  const rz  = -x * Math.sin(camYaw)  + z * Math.cos(camYaw);
  const ry2 =  y * Math.cos(camPitch) - rz * Math.sin(camPitch);
  const rz2 =  y * Math.sin(camPitch) + rz * Math.cos(camPitch);
  const sc  = 700 / Math.max(700 + rz2, 1) * (camDist / 500);
  return { sx: W / 2 + rx * sc, sy: H / 2 + ry2 * sc, scale: sc, rz: rz2 };
}

/* Kamera sürükleme — masaüstü */
let drag = null;
canvas.addEventListener('mousedown', e => {
  drag = { x: e.clientX, y: e.clientY, yaw: camYaw, pitch: camPitch };
});
canvas.addEventListener('mousemove', e => {
  if (drag) {
    camYaw   = drag.yaw   + (e.clientX - drag.x) * .0040;
    camPitch = Math.max(.5, Math.min(Math.PI * .48,
               drag.pitch - (e.clientY - drag.y) * .0040));
  }
  updateGhost(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup',    () => { drag = null; });
canvas.addEventListener('mouseleave', () => { drag = null; ghost = null; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camDist = Math.max(HALF * .8, Math.min(HALF * 2.8, camDist + e.deltaY * .55));
}, { passive: false });
canvas.addEventListener('click', e => {
  const moved = drag && Math.hypot(e.clientX - drag.x, e.clientY - drag.y) > 4;
  if (!moved) onBoardClick(e.clientX, e.clientY);
});

/* Dokunmatik */
let touch0 = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1)
    touch0 = { x: e.touches[0].clientX, y: e.touches[0].clientY,
               yaw: camYaw, pitch: camPitch };
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touch0 && e.touches.length === 1) {
    camYaw   = touch0.yaw   + (e.touches[0].clientX - touch0.x) * .005;
    camPitch = Math.max(.5, Math.min(Math.PI * .48,
               touch0.pitch - (e.touches[0].clientY - touch0.y) * .005));
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (touch0 && e.changedTouches.length === 1) {
    const dx = e.changedTouches[0].clientX - touch0.x;
    const dy = e.changedTouches[0].clientY - touch0.y;
    if (Math.hypot(dx, dy) < 8)
      onBoardClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
  touch0 = null;
});

/* Ahşap doku */
const woodCv = document.createElement('canvas');
woodCv.width = woodCv.height = 512;
(function () {
  const wc = woodCv.getContext('2d');
  const g  = wc.createLinearGradient(0, 0, 512, 0);
  g.addColorStop(0, '#c8a84a'); g.addColorStop(.38, '#c2a040'); g.addColorStop(1, '#c8a444');
  wc.fillStyle = g; wc.fillRect(0, 0, 512, 512);
  wc.globalAlpha = .055;
  for (let i = 0; i < 120; i++) {
    const y = Math.random() * 512, dk = i % 7 === 0;
    wc.strokeStyle = dk ? '#5a2e00' : '#e8d060';
    wc.lineWidth = dk ? Math.random() * 1.2 + .4 : Math.random() * .8 + .2;
    wc.beginPath(); wc.moveTo(0, y);
    wc.bezierCurveTo(128, y + (Math.random() - .5) * 3,
                     384, y + (Math.random() - .5) * 3, 512, y);
    wc.stroke();
  }
  wc.globalAlpha = 1;
})();
const woodPat = ctx.createPattern(woodCv, 'repeat');

/* ══════════════════════════════════════════════════════
   OYUN DURUMU
══════════════════════════════════════════════════════ */
const COL_LABELS = 'ABCDEFGHJ'; // I atlanır

const CLUB_PROFILE = 'club';
let currentGameSettings={profile:CLUB_PROFILE,komi:6.5,handicap:[],reason:'Kulüp Robotu'};
let resignConfirmUntil=0;

const GO_TIPS = [
  'İki göz yapan grup ölmez.',
  'Köşeler önce, kenarlar sonra, merkez en son.',
  'Pas geçmek de stratejik bir hamledir.',
  'Bağlı taşlar birlikte nefes alır.',
  'Atari durumunda kaçmak ya da feda etmek arasında seç.',
  'Ko savaşları tehdit yaratmakla kazanılır.',
  'Düşmanın en güçlü hamlesi senin hamlendir.',
];
let tipIndex = 0;
let tipTimer = null;

let board       = new BoardState(SIZE);
let playerColor = 'black';
let aiColor     = 'white';
let moveCount   = 0;
let passCount   = 0; // ardışık pas sayısı
let ghost       = null;
let lastAIMoveXY = null; // AI'nın son hamlesi (vurgulama için)
let gameEnded   = false;
let territory   = null;   // { black:[{x,y}…], white:[{x,y}…] } oyun bitince dolar
let hlTime      = 0;

// Hamle geçmişi — analiz için
let gameHistory = []; // [{color:'black'|'white', x, y, pass:bool}]

/* ── Board sync yardımcısı ── */
function syncBoard(newState) {
  board.grid    = newState.grid;
  board.stones  = newState.stones;
  board.turn    = newState.turn;
  board.koPoint = newState.koPoint;
  board.size    = newState.size;
}

/* ── Ekran → grid dönüşümü ── */
function screenToGrid(sx, sy) {
  const Y = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  let best = null, bestD = Infinity;
  for (let gx = 0; gx < SIZE; gx++) {
    for (let gz = 0; gz < SIZE; gz++) {
      const wx = -HALF + gx * CELL, wz = -HALF + gz * CELL;
      const p  = project(wx, Y, wz);
      const d  = Math.hypot(p.sx - sx, p.sy - sy);
      if (d < bestD) { bestD = d; best = { gx, gz, scale: p.scale }; }
    }
  }
  return best && bestD < CELL * best.scale * 1.15 ? best : null;
}

function updateGhost(mx, my) {
  ghost = screenToGrid(mx, my);
}

/* ── Durum gösterimi ── */
function updateStatus() {
  const isBlackTurn = board.turn === 'black';
  document.getElementById('stone-b').classList.toggle('active',  isBlackTurn);
  document.getElementById('stone-w').classList.toggle('active', !isBlackTurn);
  document.getElementById('s-label').textContent =
    isBlackTurn ? "Siyah'ın sırası" : "Beyaz'ın sırası";
}

function updateMoveTag(label) {
  // Hamle notasyonu sade oyun ekranında gösterilmez.
}

function updateEngineBadge(state) {
  const el = document.getElementById('engine-badge');
  if (state === 'loading') {
    el.textContent = 'Motor Yükleniyor';
    el.classList.remove('ready');
  } else if (state === 'mcts') {
    el.textContent = 'Temel Motor';
    el.classList.remove('ready');
  } else if (state === 'kata') {
    el.textContent = 'KataGo';
    el.classList.add('ready');
  }
}

function initModelLoader() {
  if (window.mascotThink) mascotThink('Motor hazırlanıyor…');
  const phases = ['Ağırlıklar indiriliyor…', 'Model derleniyor…', 'GPU hazırlanıyor…'];
  let ph = 0;
  const phEl = document.getElementById('ml-phase');
  const tipEl = document.getElementById('ml-tip');
  const loEl  = document.getElementById('model-loader');

  loEl.classList.add('show');
  phEl.textContent = phases[ph];
  tipEl.textContent = GO_TIPS[0];
  setTimeout(() => tipEl.classList.add('show'), 100);

  tipTimer = setInterval(() => {
    tipEl.classList.remove('show');
    setTimeout(() => {
      tipIndex = (tipIndex + 1) % GO_TIPS.length;
      tipEl.textContent = GO_TIPS[tipIndex];
      tipEl.classList.add('show');
    }, 500);
  }, 5000);

  const phTimer = setInterval(() => {
    ph++;
    if (ph < phases.length) phEl.textContent = phases[ph];
    else clearInterval(phTimer);
  }, 4000);
}


let _fbTimer = null;
function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className   = `show ${type || ''}`;
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function showGameOver(scoreInfo) {
  lastScoreInfo = scoreInfo;

  if (scoreInfo.blackTerritory || scoreInfo.whiteTerritory) {
    const mkSet = arr => new Set((arr || []).map(p => p.x + ',' + p.y));
    territory = {
      black:     scoreInfo.blackTerritory || [],
      white:     scoreInfo.whiteTerritory || [],
      deadBlack: mkSet(scoreInfo.blackDead),
      deadWhite: mkSet(scoreInfo.whiteDead),
    };
  }

  const el = document.getElementById('gameover');
  el.classList.add('show');
  document.getElementById('btn-pass').disabled = true;
  document.getElementById('btn-resign').disabled = true;

  const winner    = scoreInfo.winner;
  const winnerTr  = winner === 'black' ? 'Siyah' : 'Beyaz';
  const margin    = scoreInfo.rawDiff==null?null:Math.abs(scoreInfo.rawDiff).toFixed(1);
  const isPlayerWin = winner === playerColor;
  document.getElementById('go-winner').textContent =
    isPlayerWin ? 'Oyun bitti: sen kazandın' : 'Oyun bitti: robot kazandı';
  if (isPlayerWin && window.mascotCelebrate) { mascotCelebrate(); mascotSay('Tebrikler!', 3000); }
  document.getElementById('go-score').textContent = scoreInfo.resigned
    ? `${winnerTr} kazandı; diğer oyuncu teslim oldu. Yeni oyun başlatabilirsin.`
    : `${winnerTr} ${margin} puan farkla kazandı. Yeni oyun başlatabilirsin.`;
  document.getElementById('go-komi').textContent =
    `Komi ${scoreInfo.komi}: beyaza oyun başında eklenen denge puanı.`;

  const bLen = (scoreInfo.blackTerritory || []).length;
  const wLen = (scoreInfo.whiteTerritory || []).length;
  document.getElementById('go-territory').textContent =
    `Sayım özeti: Siyah bölgesi ${bLen}, Beyaz bölgesi ${wLen}.`;
}

window.openLearnFeedback = function() {
  if (!window.mascotSay) return;
  const diff = lastScoreInfo ? Math.abs(lastScoreInfo.rawDiff).toFixed(1) : '?';
  mascotSay(
    `Bu oyunda alan farkı ${diff} puandı. Köşeleri erkenden kapatmayı dene. Dersler için: Öğrenme Motoru.`,
    8000
  );
};

/* ══════════════════════════════════════════════════════
   AI WORKERS
══════════════════════════════════════════════════════ */
// Politika modeli arka planda yüklenir; hazır olana kadar MCTS geçici yedektir.
const mctsWorker = new Worker('./workers/goAI.worker.js', { type: 'module' });
const policyWorker = new Worker('./workers/kataWorker.js');

let aiThinking   = false;
let policyReady = false;
const pendingPolicy = new Map();
const POLICY_TIMEOUT_MS=4000;
const MIN_MOVE_DISPLAY_MS=4000;
let lastScoreInfo = null;
let currentGameId=0;
let nextRequestId=0;
let activeRequestId=null;
let moveVisibleAt=0;
let delayedMoveTimer=null;
let delayedMoveData=null;

function invalidatePendingAI(){
  currentGameId++;
  for(const pending of pendingPolicy.values())clearTimeout(pending.timeoutId);
  pendingPolicy.clear();
  if(delayedMoveTimer!==null)clearTimeout(delayedMoveTimer);
  delayedMoveTimer=null;
  delayedMoveData=null;
  moveVisibleAt=0;
  activeRequestId=null;
  aiThinking=false;
  document.getElementById('think-bar').classList.remove('show');
}

function finishThinking(){
  if(delayedMoveTimer!==null)clearTimeout(delayedMoveTimer);
  delayedMoveTimer=null;
  delayedMoveData=null;
  moveVisibleAt=0;
  activeRequestId=null;
  aiThinking=false;
  document.getElementById('think-bar').classList.remove('show');
}

function handleWorkerMessage(data) {
  if(data.gameId!==currentGameId||data.requestId!==activeRequestId)return;

  if (!data.ok) {
    finishThinking();
    showFeedback('Robot hatası: ' + data.error, 'err');
    console.error('AI Worker error:', data.error);
    return;
  }

  if (data.type === 'SCORE') { finishThinking();showGameOver(data.score); return; }

  const applyStoredMove=()=>{
    if(data.gameId!==currentGameId||data.requestId!==activeRequestId)return;
    delayedMoveTimer=null;
    delayedMoveData=null;
    finishThinking();
    applyAIMove(data.move);
  };
  const remaining=Math.max(0,moveVisibleAt-Date.now());
  if(remaining>0){
    delayedMoveData=data;
    delayedMoveTimer=setTimeout(applyStoredMove,remaining);
  }else applyStoredMove();
}

mctsWorker.addEventListener('message', ({ data }) => handleWorkerMessage(data));
mctsWorker.addEventListener('error', e => {
  finishThinking();
  showFeedback('Robot bağlanamadı.', 'err');
  console.error('Worker error:', e);
});

function sendMctsFallback(payload){
  const grid=payload.boardData.grid;
  try{mctsWorker.postMessage({...payload,type:'MOVE_PROFILE',profile:CLUB_PROFILE},[grid.buffer])}
  catch(error){finishThinking();showFeedback('Robot bağlanamadı.','err');console.error(error)}
}

function fallbackPolicyRequest(key){
  const pending=pendingPolicy.get(key);
  if(!pending)return;
  clearTimeout(pending.timeoutId);
  pendingPolicy.delete(key);
  const {payload}=pending;
  if(payload.gameId!==currentGameId||payload.requestId!==activeRequestId)return;
  sendMctsFallback(payload);
}

function fallbackAllPolicyRequests(){
  for(const key of [...pendingPolicy.keys()])fallbackPolicyRequest(key);
}

policyWorker.addEventListener('message',({data})=>{
  if(data.type==='READY'){
    policyReady=Boolean(data.ok);
    if(!policyReady)fallbackAllPolicyRequests();
    return;
  }
  const key=`${data.gameId}:${data.requestId}`,pending=pendingPolicy.get(key);
  if(!pending)return;
  if(!data.ok){policyReady=false;fallbackPolicyRequest(key);return}
  clearTimeout(pending.timeoutId);
  pendingPolicy.delete(key);
  handleWorkerMessage(data);
});
policyWorker.addEventListener('error',()=>{policyReady=false;fallbackAllPolicyRequests()});

function triggerAI() {
  if (aiThinking || gameEnded) return;
  if (board.turn !== aiColor)  return;

  aiThinking = true;
  document.getElementById('think-bar').classList.add('show');

  const size = board.size;
  const grid = new Int8Array(size * size);
  for (const s of board.stones) {
    grid[s.y * size + s.x] = s.color === 'black' ? 1 : 2;
  }
  const ko     = board.koPoint
    ? board.koPoint.y * size + board.koPoint.x : -1;
  const colNum = aiColor === 'black' ? 1 : 2;
  const boardData={grid,ko,size,komi:currentGameSettings.komi,previousPass:passCount===1,moveCount};
  const requestId=++nextRequestId;
  activeRequestId=requestId;
  moveVisibleAt=Date.now()+MIN_MOVE_DISPLAY_MS;

  const payload={type:'MOVE',boardData,color:colNum,gameId:currentGameId,requestId};
  if(policyReady){
    const key=`${currentGameId}:${requestId}`;
    const timeoutId=setTimeout(()=>fallbackPolicyRequest(key),POLICY_TIMEOUT_MS);
    pendingPolicy.set(key,{payload,timeoutId});
    try{policyWorker.postMessage(payload)}catch(error){policyReady=false;fallbackPolicyRequest(key)}
  }else sendMctsFallback(payload);
}

function requestFinalScore() {
  const size = board.size;
  const grid = new Int8Array(size * size);
  for (const s of board.stones) {
    grid[s.y * size + s.x] = s.color === 'black' ? 1 : 2;
  }
  const ko = board.koPoint ? board.koPoint.y * size + board.koPoint.x : -1;
  const requestId=++nextRequestId;
  activeRequestId=requestId;
  mctsWorker.postMessage(
    { type: 'SCORE', boardData: { grid, ko, size, komi:currentGameSettings.komi }, gameId:currentGameId, requestId },
    [grid.buffer]
  );
}

function applyAIMove(move) {
  lastAIMoveXY = null;

  if (move === 'pass') {
    gameHistory.push({ color: aiColor, x: -1, y: -1, pass: true });
    board.turn = board.turn === 'black' ? 'white' : 'black';
    passCount++;
    showFeedback('Robot pas geçti.', 'ai');
    updateMoveTag('Robot: Pas');
    updateStatus();
    if (passCount >= 2) { checkGameOver(); return; }
    return; // sıra tekrar oyuncuda
  }

  passCount = 0;
  const { x, y } = move;
  const { newState } = applyMove(board, x, y, board.turn);
  syncBoard(newState);
  gameHistory.push({ color: aiColor, x, y, pass: false });

  lastAIMoveXY = { x, y };
  moveCount++;
  const tag = `Robot: ${COL_LABELS[x]}${SIZE - y}`;
  updateMoveTag(tag);
  showFeedback(tag, 'ai');
  updateStatus();
}

function checkGameOver() {
  gameEnded = true;
  invalidatePendingAI();
  requestFinalScore();
}

function drawBoard() {
  const bh = BOARD_H / 2, bw = HALF + CELL * .82;
  function face(corners, fill, stroke) {
    const pts = corners.map(([x, y, z]) => project(x, y, z));
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy));
    ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
    ctx.strokeStyle = stroke || fill; ctx.lineWidth = 1; ctx.stroke();
  }
  face([[-bw,-bh,-bw],[-bw,-bh,bw],[-bw,bh,bw],[-bw,bh,-bw]], '#7a4e0e', '#5e3a08');
  face([[-bw,-bh,bw],[bw,-bh,bw],[bw,bh,bw],[-bw,bh,bw]],     '#8a5a12', '#6a4408');
  face([[bw,-bh,-bw],[bw,-bh,bw],[bw,bh,bw],[bw,bh,-bw]],      '#966014', '#724808');

  const top  = [[-bw,-bh,-bw],[bw,-bh,-bw],[bw,-bh,bw],[-bw,-bh,bw]];
  const tpts = top.map(([x, y, z]) => project(x, y, z));
  ctx.save();
  ctx.beginPath();
  tpts.forEach((p, i) => i === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy));
  ctx.closePath(); ctx.clip();
  ctx.fillStyle = woodPat; ctx.globalAlpha = .96; ctx.fill();
  ctx.globalAlpha = .06; ctx.fillStyle = '#2a1200'; ctx.fill();
  ctx.globalAlpha = 1; ctx.strokeStyle = '#6a4008'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.restore();
}

function drawGrid() {
  const Y = -BOARD_H / 2 - .4;
  const corners = [[-HALF,Y,-HALF],[HALF,Y,-HALF],[HALF,Y,HALF],[-HALF,Y,HALF]];
  ctx.strokeStyle = 'rgba(55,24,0,.92)'; ctx.lineWidth = 1.9;
  for (let i = 0; i < 4; i++) {
    const a = project(...corners[i]), b = project(...corners[(i + 1) % 4]);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(55,24,0,.68)'; ctx.lineWidth = .8;
  for (let i = 1; i < SIZE - 1; i++) {
    const p = -HALF + i * CELL;
    let a = project(p, Y, -HALF), b = project(p, Y, HALF);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    a = project(-HALF, Y, p); b = project(HALF, Y, p);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
  const HOSHI = [[2,2],[6,2],[4,4],[2,6],[6,6]];
  HOSHI.forEach(([sx, sz]) => {
    const p = project(-HALF + sx * CELL, Y, -HALF + sz * CELL);
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 3.8 * p.scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(48,20,0,.88)'; ctx.fill();
  });
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < SIZE; i++) {
    const pos = -HALF + i * CELL;
    const lb  = project(pos, Y, HALF + CELL * .72);
    const nl  = project(-HALF - CELL * .72, Y, pos);
    const fs  = Math.round(9 * lb.scale); if (fs < 6) continue;
    ctx.font = `bold ${fs}px monospace`; ctx.fillStyle = 'rgba(75,36,6,.78)';
    ctx.fillText(COL_LABELS[i], lb.sx, lb.sy);
    ctx.fillText(String(SIZE - i), nl.sx, nl.sy);
  }
}

function drawStone(gx, gz, color, alpha, highlighted) {
  const Y  = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  const wx = -HALF + gx * CELL, wz = -HALF + gz * CELL;
  const p  = project(wx, Y, wz);
  const sp = Math.sin(camPitch), cp = Math.cos(camPitch);
  const rx = STONE_R * p.scale;
  const ry = rx * Math.sqrt(sp * sp + ASPECT3D * ASPECT3D * cp * cp);

  ctx.save();
  ctx.globalAlpha = alpha ?? 1;

  /* Gölge */
  ctx.beginPath();
  ctx.ellipse(p.sx + 1, p.sy + ry * .35, rx * .92, ry * .38, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.fill();

  /* Taş */
  const gr = ctx.createRadialGradient(p.sx - rx * .28, p.sy - ry * .28, rx * .05, p.sx, p.sy, rx);
  if (color === 'black') {
    gr.addColorStop(0, '#50505a'); gr.addColorStop(1, '#0c0c12');
  } else {
    gr.addColorStop(0, '#ffffff'); gr.addColorStop(1, '#c4c0ba');
  }
  ctx.beginPath();
  ctx.ellipse(p.sx, p.sy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = gr;
  ctx.fill();

  /* AI son hamle işareti — üçgen */
  if (highlighted) {
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, rx * .32, 0, Math.PI * 2);
    ctx.fillStyle = color === 'black' ? 'rgba(255,255,255,.55)' : 'rgba(0,0,0,.38)';
    ctx.fill();
  }

  ctx.restore();
}

function drawGhost() {
  if (!ghost || gameEnded) return;
  if (board.turn !== playerColor) return;
  if (board.isOccupied(ghost.gx, ghost.gz)) return;
  const check = isValidMove(board, ghost.gx, ghost.gz, board.turn);
  if (!check.valid) return;
  drawStone(ghost.gx, ghost.gz, board.turn, 0.35, false);
}

function drawStones() {
  const Y = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  const sorted = [...board.stones].sort((a, b) => {
    const pa = project(-HALF + a.x * CELL, Y, -HALF + a.y * CELL);
    const pb = project(-HALF + b.x * CELL, Y, -HALF + b.y * CELL);
    return pb.rz - pa.rz; // uzaktaki önce çizilir (painter's algorithm)
  });
  for (const s of sorted) {
    const isLast = lastAIMoveXY && s.x === lastAIMoveXY.x && s.y === lastAIMoveXY.y;
    const deadSet = territory && (s.color === 1 ? territory.deadBlack : territory.deadWhite);
    const alpha = deadSet && deadSet.has(s.x + ',' + s.y) ? 0.25 : 1;
    drawStone(s.x, s.y, s.color, alpha, isLast);
  }
}

function drawKo() {
  if (!board.koPoint) return;
  const { x, y } = board.koPoint;
  const Y  = -(BOARD_H / 2) - STONE_R * ASPECT3D - 1;
  const p  = project(-HALF + x * CELL, Y, -HALF + y * CELL);
  const rx = STONE_R * p.scale;
  const pulse = .6 + .4 * Math.sin(Date.now() * .005);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = '#e05050'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(p.sx, p.sy, rx * .52, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function drawTerritory() {
  if (!territory) return;
  const Y   = -BOARD_H / 2 - 0.3;
  const ARM = CELL * 0.22;
  const pulse = 0.55 + 0.45 * Math.sin(hlTime * 1.4);

  [
    [territory.black, '#1a1a2e'],
    [territory.white, '#f5f0e8'],
  ].forEach(([pts, col]) => {
    if (!pts?.length) return;
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth   = Math.max(1, 2.0);
    ctx.lineCap     = 'round';
    ctx.globalAlpha = 0.90 * pulse;
    pts.forEach(({ x, y }) => {
      const wx = -HALF + x * CELL;
      const wz = -HALF + y * CELL;
      const p  = project(wx, Y, wz);
      if (p.scale < 0.15) return;
      const pL = project(wx - ARM, Y, wz);
      const pR = project(wx + ARM, Y, wz);
      const pU = project(wx, Y, wz - ARM);
      const pD = project(wx, Y, wz + ARM);
      ctx.beginPath(); ctx.moveTo(pL.sx, pL.sy); ctx.lineTo(pR.sx, pR.sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pU.sx, pU.sy); ctx.lineTo(pD.sx, pD.sy); ctx.stroke();
    });
    ctx.restore();
  });
}

/* Ana render döngüsü */
function frame() {
  hlTime += 0.04;
  ctx.clearRect(0, 0, W, H);
  drawBoard();
  drawGrid();
  drawGhost();
  drawStones();
  drawKo();
  drawTerritory();
  requestAnimationFrame(frame);
}

// ── parseKataGoOutput: worker çıktısını iç formata çevirir ──────
function parseKataGoOutput(result) {
  // result: { winrateBlack, scoreMean, moveInfos, bestMove, bestX, bestY }
  return {
    branches:  result.moveInfos || [],
    win_rate:  result.winrateBlack ?? 0.5,
    score:     result.scoreMean   ?? 0,
  };
}

// ── getWorstMoves9x9: en kötü 4 hamle (her oyuncudan 2) ─────────
function getWorstMoves9x9(reviewData) {
  if (!reviewData) return [];
  const { moves } = reviewData;
  const QUALITY_RANK = { best:0, good:1, inaccuracy:2, mistake:3, blunder:4 };

  const all = Object.values(moves).filter(m => !m.pass);
  const black = all.filter(m => m.color === 'B')
    .sort((a,b) => (QUALITY_RANK[b.quality]||0) - (QUALITY_RANK[a.quality]||0));
  const white = all.filter(m => m.color === 'W')
    .sort((a,b) => (QUALITY_RANK[b.quality]||0) - (QUALITY_RANK[a.quality]||0));

  // En kötü 2'şer → quality rank ≥ inaccuracy
  const pick = (arr, n) => arr
    .filter(m => (QUALITY_RANK[m.quality] || 0) >= 2)
    .slice(0, n);

  return [...pick(black, 2), ...pick(white, 2)];
}

function getTurkishExplanation(md) {
  if (!md || md.pass) return 'Pas';
  const colorTr  = md.color === 'B' ? 'Siyah' : 'Beyaz';
  const move     = md.move   || '?';
  const best     = md.bestMove || '?';
  const orderStr = md.order === 0 ? 'birinci' : md.order <= 2 ? 'ilk üç' : `${md.order + 1}.`;

  switch (md.quality) {
    case 'best':
      return `${colorTr} <strong>${move}</strong> — Harika! KataGo'nun da ${orderStr} tercihi.`;
    case 'good':
      return `${colorTr} <strong>${move}</strong> — İyi hamle. KataGo ${best}'ı tercih eder, ama bu da makul.`;
    case 'inaccuracy':
      return `${colorTr} <strong>${move}</strong> — Küçük hata. <strong>${best}</strong> daha güçlü olurdu (sıralama: ${orderStr} seçenek).`;
    case 'mistake':
      return `${colorTr} <strong>${move}</strong> yerine <strong>${best}</strong> oynamak önemliydi. Bu hamle pozisyonu zorlaştırdı.`;
    case 'blunder':
      return `${colorTr} <strong>${move}</strong> — Büyük hata! <strong>${best}</strong> gibi kritik bir hamle kaçırıldı.`;
    default:
      return `${colorTr} ${move}`;
  }
}

    document.getElementById('rv-analyze-label').textContent =
      `Analiz ediliyor… ${data.current}/${data.total}`;

    reviewData = data.data;
    document.getElementById('rv-analyzing').classList.remove('show');

    document.getElementById('rv-analyzing').classList.remove('show');
    document.getElementById('rv-move-info').textContent =
      'Analiz başarısız: ' + data.error;
  }
}

      if (reviewReady) setTimeout(startAnalysis, 300);
    }
  });
};

window.closeReview = function () {
  document.getElementById('review-overlay').classList.remove('show');
};

function startAnalysis() {
  if (!REVIEW_ENABLED || !reviewWorker || !reviewReady || gameHistory.length === 0) return;
  reviewData = null;
  document.getElementById('rv-worst-list').innerHTML = '';
  document.getElementById('rv-move-list').innerHTML = '';
  document.getElementById('rv-progress-fill').style.width = '0%';
  document.getElementById('rv-analyzing').classList.add('show');
  reviewWorker.postMessage({
    type:  'ANALYZE_GAME',
    moves: gameHistory,  // pas dahil tüm hamleler (moveNumber = rvIdx ile eşleşir)
    size:  SIZE,
    komi:  currentGameSettings.komi,
  });
}

// ── Taş geçmişi (replay) ─────────────────────────────────────────
function buildStoneHistory() {
  // Fake-replay the game to know board state at each move
  rvStoneHist = [[]]; // move 0 = empty board
  let g = new Int8Array(SIZE * SIZE);

  for (const m of gameHistory) {
    if (m.pass) { rvStoneHist.push([...rvStoneHist[rvStoneHist.length-1]]); continue; }
    const color = m.color === 'black' ? 1 : 2;
    g = replayApplyMove(g, SIZE, m.x, m.y, color);
    const stones = [];
    for (let i = 0; i < SIZE*SIZE; i++) {
      if (g[i]) stones.push({ color: g[i]===1?'black':'white', x:i%SIZE, y:(i/SIZE)|0 });
    }
    rvStoneHist.push(stones);
  }
}

function replayApplyMove(grid, size, x, y, color) {
  const ng  = grid.slice();
  const opp = 3 - color;
  ng[y*size+x] = color;
  const nbrs = [];
  if (x>0) nbrs.push(y*size+(x-1));
  if (x<size-1) nbrs.push(y*size+(x+1));
  if (y>0) nbrs.push((y-1)*size+x);
  if (y<size-1) nbrs.push((y+1)*size+x);
  for (const n of nbrs) {
    if (ng[n] !== opp) continue;
    if (replayGroupLibs(ng, size, n) === 0) replayRemoveGroup(ng, size, n, opp);
  }
  return ng;
}
function replayGroupLibs(g, size, start) {
  const col = g[start]; if (!col) return 0;
  const vis = new Uint8Array(size*size), libs = new Set(), stk = [start];
  while (stk.length) {
    const i = stk.pop(); if (vis[i]) continue; vis[i]=1;
    if (g[i]!==col) continue;
    const x=i%size, y=(i/size)|0;
    [x>0&&i-1,x<size-1&&i+1,y>0&&i-size,y<size-1&&i+size]
      .filter(Boolean).forEach(n => g[n]===0 ? libs.add(n) : (!vis[n]&&stk.push(n)));
  }
  return libs.size;
}
function replayRemoveGroup(g, size, start, col) {
  const stk = [start], vis = new Uint8Array(size*size);
  while (stk.length) {
    const i=stk.pop(); if(vis[i]) continue; vis[i]=1;
    if(g[i]!==col) continue; g[i]=0;
    const x=i%size,y=(i/size)|0;
    [x>0&&i-1,x<size-1&&i+1,y>0&&i-size,y<size-1&&i+size]
      .filter(Boolean).forEach(n => !vis[n]&&stk.push(n));
  }
}

// ── Review UI Builder ────────────────────────────────────────────
function buildReviewUI(rd) {
  const worst = getWorstMoves9x9(rd);
  buildWorstList(worst);
  buildMoveList(rd);
  drawWinrateChart(rd, worst);
}

function buildWorstList(worst) {
  const el = document.getElementById('rv-worst-list');
  el.innerHTML = '';
  if (!worst.length) { el.innerHTML = '<div class="worst-empty">B?y?k hata yok!</div>'; return; }
  worst.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'rv-worst-btn';
    btn.onclick = () => rvGoto(m.moveNumber);
    const quality = (m.quality === 'best' || m.quality === 'good') ? 'good' : m.quality;
    btn.innerHTML = `
      <div class="worst-dot worst-dot--${quality}"></div>
      <span class="rv-worst-text">${m.color==='B'?'Siyah':'Beyaz'} #${m.moveNumber} ? ${m.move}</span>
      <span class="worst-badge worst-badge--${quality}">${m.quality === 'blunder' ? 'B?y?k Hata' : 'Hata'}</span>`;
    el.appendChild(btn);
  });
}

function buildMoveList(rd) {
  const el = document.getElementById('rv-move-list');
  el.innerHTML = '';
  const COLORS = { best:'q-best',good:'q-good',inaccuracy:'q-inaccuracy',mistake:'q-mistake',blunder:'q-blunder' };
  Object.values(rd.moves).forEach(m => {
    if (m.pass) return;
    const row = document.createElement('div');
    row.className = 'rv-move-row';
    row.id = `rv-row-${m.moveNumber}`;
    row.onclick = () => rvGoto(m.moveNumber);
    row.innerHTML = `
      <span class="rv-move-num">${m.moveNumber}</span>
      <div class="rv-move-stone ${m.color==='B'?'b':'w'}"></div>
      <span class="rv-move-label">${m.move}</span>
      <div class="rv-quality-dot ${COLORS[m.quality] || 'q-inaccuracy'}"></div>`;
    el.appendChild(row);
  });
}

// ── Winrate Grafiği ──────────────────────────────────────────────
function drawWinrateChart(rd, worst) {
  const canvas = document.getElementById('rv-chart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.offsetWidth || 228;
  const h   = 56;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const rates = rd.win_rates;
  if (!rates.length) return;

  const N  = rates.length;
  const xS = w / N;
  const midY = h / 2;

  // Background
  ctx.fillStyle = 'rgba(255,255,255,.03)';
  ctx.fillRect(0, 0, w, h);

  // 50% line
  ctx.strokeStyle = 'rgba(255,255,255,.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(w, midY); ctx.stroke();

  // Siyah alan (üst)
  const gB = ctx.createLinearGradient(0, 0, 0, midY);
  gB.addColorStop(0, 'rgba(30,30,50,.85)');
  gB.addColorStop(1, 'rgba(80,80,110,.4)');

  // Beyaz alan (alt)
  const gW = ctx.createLinearGradient(0, midY, 0, h);
  gW.addColorStop(0, 'rgba(240,235,220,.4)');
  gW.addColorStop(1, 'rgba(200,190,170,.85)');

  // Black area
  ctx.beginPath(); ctx.moveTo(0, midY);
  rates.forEach((r, i) => { ctx.lineTo(i * xS, (1-r) * h); });
  ctx.lineTo((N-1) * xS, midY);
  ctx.closePath(); ctx.fillStyle = gB; ctx.fill();

  // White area
  ctx.beginPath(); ctx.moveTo(0, midY);
  rates.forEach((r, i) => { ctx.lineTo(i * xS, (1-r) * h); });
  ctx.lineTo((N-1) * xS, midY);
  ctx.closePath(); ctx.fillStyle = gW; ctx.fill();

  // Line
  ctx.beginPath();
  rates.forEach((r, i) => {
    const fx = i * xS, fy = (1-r) * h;
    i === 0 ? ctx.moveTo(fx, fy) : ctx.lineTo(fx, fy);
  });
  ctx.strokeStyle = 'rgba(200,168,75,.8)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Red dots on worst moves
  const worstSet = new Set((worst||[]).map(m => m.moveNumber - 1));
  rates.forEach((r, i) => {
    if (!worstSet.has(i)) return;
    ctx.beginPath();
    ctx.arc(i * xS, (1-r) * h, 3, 0, Math.PI*2);
    ctx.fillStyle = 'var(--red)'; ctx.fill();
  });

  // Summary label
  const lastWr = rates[rates.length-1];
  document.getElementById('rv-chart-summary').textContent =
    lastWr > 0.5 ? `Siyah +${((lastWr-0.5)*200).toFixed(0)}%` :
    lastWr < 0.5 ? `Beyaz +${((0.5-lastWr)*200).toFixed(0)}%` : 'Eşit';
}

// ── Tahta Çizimi (2D, inceleme için) ─────────────────────────────
function drawReviewBoard(stones, highlight, heatmap, lastMove) {
  const canvas = document.getElementById('rv-canvas');
  if (!canvas) return;
  const wrap = document.getElementById('rv-board');
  const maxSide = Math.min(
    wrap.offsetWidth  || 300,
    (document.getElementById('rv-board-pane').offsetHeight || 420) - 80
  );
  const side = Math.max(200, Math.min(maxSide, 380));
  canvas.style.width  = side + 'px';
  canvas.style.height = side + 'px';

  const dpr = window.devicePixelRatio || 1;
  canvas.width  = side * dpr;
  canvas.height = side * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = side, h = side;

  const cell = Math.floor(Math.min(w,h) / (SIZE + 1));
  const padX = Math.floor((w - (SIZE-1)*cell) / 2);
  const padY = Math.floor((h - (SIZE-1)*cell) / 2);
  const sR   = cell * 0.46;

  // Board
  ctx.fillStyle = '#c8a84a'; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#7a5c0a'; ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    ctx.beginPath(); ctx.moveTo(padX+i*cell, padY); ctx.lineTo(padX+i*cell, padY+(SIZE-1)*cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(padX, padY+i*cell); ctx.lineTo(padX+(SIZE-1)*cell, padY+i*cell); ctx.stroke();
  }
  RV_HOSHI_9.forEach(([hx,hy]) => {
    ctx.beginPath(); ctx.arc(padX+hx*cell, padY+hy*cell, 3, 0, Math.PI*2);
    ctx.fillStyle='#5c3d0a'; ctx.fill();
  });

  // Heatmap (visit intensity → blue circles)
  if (heatmap?.length) {
    const maxP = heatmap[0].prior;
    heatmap.slice(0, 10).forEach(({ x, y, prior }) => {
      const alpha = Math.max(0.05, (prior / (maxP || 1)) * 0.45);
      ctx.beginPath(); ctx.arc(padX+x*cell, padY+y*cell, sR, 0, Math.PI*2);
      ctx.fillStyle = `rgba(74,158,255,${alpha.toFixed(2)})`; ctx.fill();
    });
    // Best move: solid blue ring
    const bst = heatmap[0];
    ctx.beginPath(); ctx.arc(padX+bst.x*cell, padY+bst.y*cell, sR*.82, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(74,158,255,.9)'; ctx.lineWidth = 2.2; ctx.stroke();
  }

  // Stones
  stones?.forEach(({ color, x, y }) => {
    const px = padX+x*cell, py = padY+y*cell;
    const r  = sR;
    ctx.save();
    if (color === 'black') {
      const g = ctx.createRadialGradient(px-r*.3,py-r*.3,r*.08,px,py,r);
      g.addColorStop(0,'#555'); g.addColorStop(1,'#111');
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    } else {
      const g = ctx.createRadialGradient(px-r*.3,py-r*.3,r*.05,px,py,r);
      g.addColorStop(0,'#fff'); g.addColorStop(1,'#c8c0a8');
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=.6; ctx.stroke();
    }
    ctx.restore();
  });

  // Last move marker
  if (lastMove) {
    const px = padX+lastMove.x*cell, py = padY+lastMove.y*cell;
    ctx.beginPath(); ctx.arc(px, py, sR*.28, 0, Math.PI*2);
    ctx.fillStyle = lastMove.color==='black' ? 'rgba(255,255,255,.75)' : 'rgba(0,0,0,.45)';
    ctx.fill();
  }

  // highlight square (played move vs best move)
  if (highlight) {
    const px = padX+highlight.x*cell, py = padY+highlight.y*cell;
    ctx.beginPath(); ctx.arc(px, py, sR*.55, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(240,220,60,.85)'; ctx.lineWidth = 2; ctx.stroke();
  }
}

// ── Review gezinme ────────────────────────────────────────────────
window.rvGoto = function (idx) {
  const total = gameHistory.length;
  rvIdx = Math.max(0, Math.min(total, idx));

  const stones   = rvStoneHist[rvIdx] || [];
  const lastMove = rvIdx > 0 ? gameHistory[rvIdx-1] : null;

  let md = null, heatmap = null, highlight = null;
  if (reviewData && rvIdx > 0) {
    md = reviewData.moves[rvIdx];
    heatmap   = md?.moveInfos || null;
    if (md && md.bestX !== undefined && md.bestX !== md.x) {
      highlight = { x: md.bestX, y: md.bestY };
    }
  }

  drawReviewBoard(stones, highlight, heatmap, lastMove);

  // Info text
  const infoEl = document.getElementById('rv-move-info');
  if (rvIdx === 0) {
    infoEl.innerHTML = 'Başlangıç pozisyonu';
  } else if (md) {
    infoEl.innerHTML = getTurkishExplanation(md);
    const curr = getCurriculumLink(md.quality);
    const cEl  = document.getElementById('rv-curriculum');
    if (curr && (md.quality === 'mistake' || md.quality === 'blunder')) {
      cEl.href      = curr.url;
      cEl.textContent = `→ ${curr.title} dersini gör`;
      cEl.classList.add('show');
    } else {
      cEl.classList.remove('show');
    }
  } else {
    infoEl.innerHTML = rvIdx > 0
      ? `Hamle ${rvIdx}: ${gameHistory[rvIdx-1]?.pass ? 'Pas' : COL_LABELS[gameHistory[rvIdx-1]?.x]+(SIZE-gameHistory[rvIdx-1]?.y)}`
      : '';
  }

  // Counter
  document.getElementById('rv-move-counter').textContent = `${rvIdx} / ${total}`;
  document.getElementById('rv-prev').disabled = rvIdx <= 0;
  document.getElementById('rv-next').disabled = rvIdx >= total;

  // Highlight active row in move list
  document.querySelectorAll('.rv-move-row').forEach(r => r.classList.remove('active'));
  const activeRow = document.getElementById(`rv-row-${rvIdx}`);
  if (activeRow) {
    activeRow.classList.add('active');
    activeRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Highlight worst button
  document.querySelectorAll('.rv-worst-btn').forEach(b => b.classList.remove('active'));
};

// Winrate grafiği boyut güncellemesi (overlay açılınca)
const _rvObserver = new ResizeObserver(() => {
  if (reviewData && document.getElementById('review-overlay').classList.contains('show')) {
    drawWinrateChart(reviewData, getWorstMoves9x9(reviewData));
  }
});
_rvObserver.observe(document.getElementById('rv-chart'));

// Review overlay kapatıldıktan sonra yeni oyun için temizle
const _origReset = window.resetBoard;
window.resetBoard = function() {
  reviewData = null;
  rvIdx = 0;
  _origReset();
};
